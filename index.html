<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Wish Note | دفتر آرزوها</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #ff9a9e;
            --secondary: #fecfef;
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-dark: #4a4a4a;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin-top: 40px;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            margin: 0 0 10px 0;
            color: #ff6b81;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.5);
        }

        p.subtitle {
            margin: 0 0 20px 0;
            font-size: 1.1rem;
            color: #555;
        }

        input[type="text"], input[type="date"] {
            width: 90%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid transparent;
            border-radius: 15px;
            font-family: inherit;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.7);
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, input[type="date"]:focus {
            border-color: #ff6b81;
            background: white;
            box-shadow: 0 0 15px rgba(255, 107, 129, 0.2);
        }

        button.btn-add {
            background: linear-gradient(45deg, #ff6b81, #ff9a9e);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 15px;
            cursor: pointer;
            width: 90%;
            margin-top: 15px;
            font-family: inherit;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button.btn-add:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 107, 129, 0.3);
        }

        #wishes-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .wish-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .wish-card.fulfilled {
            background: rgba(186, 255, 201, 0.4);
            border-color: #baffc9;
        }

        .wish-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .wish-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin: 0;
            color: #2d3436;
        }

        .countdown {
            font-size: 1.1rem;
            color: #d63031;
            font-weight: bold;
            background: rgba(255,255,255,0.6);
            padding: 5px 15px;
            border-radius: 12px;
            margin-top: 15px;
            text-align: center;
        }

        .actions {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .btn-done {
            background: #00b894;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            flex: 1;
            font-weight: bold;
        }
        
        .btn-delete {
            background: #ff7675;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
        }

    </style>
</head>
<body>

    <div class="container">
        <!-- Input Section -->
        <div class="glass-panel">
            <h1>✨ Wish Note </h1>
            <p class="subtitle">هر چیزی اینجا بنویسی، به حقیقت می‌پیونده!</p>
            
            <input type="text" id="wishInput" placeholder="آرزوت چیه؟ (مثلا: تسلط به اسپانیایی، بستن یه سیستم خفن...)">
            <input type="date" id="dateInput" title="تا کی باید انجام بشه؟">
            <button class="btn-add" onclick="addWish()">ثبت در کائنات 🪄</button>
        </div>

        <!-- Wishes Container -->
        <div id="wishes-list"></div>
    </div>

    <script>
        let wishes = JSON.parse(localStorage.getItem('wishnote_data')) || [];

        function saveWishes() {
            localStorage.setItem('wishnote_data', JSON.stringify(wishes));
        }

        function addWish() {
            const title = document.getElementById('wishInput').value;
            const deadline = document.getElementById('dateInput').value;

            if (!title || !deadline) {
                alert("لطفاً هم آرزوت رو بنویس و هم زمانش رو مشخص کن! 🧚‍♀️");
                return;
            }

            const newWish = {
                id: Date.now(),
                title: title,
                deadline: deadline,
                isFulfilled: false
            };

            wishes.push(newWish);
            saveWishes();
            document.getElementById('wishInput').value = '';
            document.getElementById('dateInput').value = '';
            renderWishes();
        }

        function fulfillWish(id) {
            const wishIndex = wishes.findIndex(w => w.id === id);
            if(wishIndex > -1) {
                wishes[wishIndex].isFulfilled = true;
                saveWishes();
                renderWishes();
                
                // Fire Confetti! 🎉
                confetti({
                    particleCount: 150,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#ff9a9e', '#a1c4fd', '#fecfef', '#ffffff']
                });
            }
        }

        function deleteWish(id) {
            wishes = wishes.filter(w => w.id !== id);
            saveWishes();
            renderWishes();
        }

        function updateCountdowns() {
            wishes.forEach(wish => {
                if(wish.isFulfilled) return;
                
                const timerElement = document.getElementById(`timer-${wish.id}`);
                if(!timerElement) return;

                const targetDate = new Date(wish.deadline).getTime();
                const now = new Date().getTime();
                const distance = targetDate - now;

                if (distance < 0) {
                    timerElement.innerHTML = "⏳ زمانت تموم شده! ولی هنوز می‌تونی انجامش بدی!";
                    timerElement.style.color = "#d63031";
                } else {
                    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    timerElement.innerHTML = `⏳ زمان باقی‌مانده: ${days} روز و ${hours} ساعت`;
                }
            });
        }

        function renderWishes() {
            const list = document.getElementById('wishes-list');
            list.innerHTML = '';

            wishes.slice().reverse().forEach(wish => {
                const card = document.createElement('div');
                card.className = `wish-card ${wish.isFulfilled ? 'fulfilled' : ''}`;
                
                let actionButtons = '';
                if(!wish.isFulfilled) {
                    actionButtons = `
                        <button class="btn-done" onclick="fulfillWish(${wish.id})">انجامش دادم! 🥳</button>
                    `;
                } else {
                    actionButtons = `<div style="flex: 1; color: #00b894; font-weight: bold; text-align: center;">✅ آرزو برآورده شد!</div>`;
                }

                card.innerHTML = `
                    <div class="wish-header">
                        <h3 class="wish-title">${wish.title}</h3>
                    </div>
                    ${!wish.isFulfilled ? `<div class="countdown" id="timer-${wish.id}">در حال محاسبه...</div>` : ''}
                    <div class="actions">
                        ${actionButtons}
                        <button class="btn-delete" onclick="deleteWish(${wish.id})">🗑️</button>
                    </div>
                `;
                list.appendChild(card);
            });
            updateCountdowns();
        }

        // Initialize
        renderWishes();
        // Update timers every hour (or you can change to 1000ms for real-time seconds)
        setInterval(updateCountdowns, 1000 * 60); 
    </script>
</body>
</html>
